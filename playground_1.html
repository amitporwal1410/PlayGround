<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Little Playground 🎪 — Free Learning Games for Little Ones</title>
<meta name="description" content="Fifteen free, safe browser games for little kids: letters, balloons, music, painting, animals, fireworks, a hungry monster, bubbles, shapes, a puppy maze, catch, a morning routine, memory, build-a-face and sorting. No ads, no tracking, no downloads.">
<meta name="theme-color" content="#8a5cf6">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎪</text></svg>">
<script>
(function(){'use strict';
  var t=null; try{ t=localStorage.getItem('pg_theme'); }catch(e){}
  if(!t && matchMedia('(prefers-color-scheme: dark)').matches) t='dark';
  if(t==='dark') document.documentElement.dataset.theme='dark';
})();
</script>
<style>
/* ===================== base / theme ===================== */
*{ margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent; }
html{
  --bg-s1:80%; --bg-l1:88%; --bg-s2:70%; --bg-l2:90%;
  --surface:rgba(255,255,255,0.9); --surface-soft:rgba(255,255,255,0.78); --card-bg:rgba(255,255,255,0.9);
  --ink:hsl(270,25%,22%); --ink-strong:hsl(280,70%,40%); --ink-accent:hsl(20,85%,38%);
}
html[data-theme="dark"]{
  --bg-s1:45%; --bg-l1:13%; --bg-s2:50%; --bg-l2:17%;
  --surface:rgba(26,20,50,0.92); --surface-soft:rgba(40,32,74,0.82); --card-bg:rgba(32,26,60,0.94);
  --ink:hsl(270,40%,90%); --ink-strong:hsl(280,90%,80%); --ink-accent:hsl(35,95%,70%);
}
html,body{ width:100%; height:100%; font-family:"Comic Sans MS","Segoe UI",system-ui,sans-serif; }
body{
  --h:210; --h2:280;
  background:linear-gradient(135deg,hsl(var(--h),var(--bg-s1),var(--bg-l1)),hsl(var(--h2),var(--bg-s2),var(--bg-l2)));
  transition:background .6s ease; overflow:hidden; overscroll-behavior:none;
}
body.scroll{ overflow-y:auto; -webkit-overflow-scrolling:touch; }
html[data-theme="dark"] body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:-1;
  background-image:
    radial-gradient(2px 2px at 12% 22%,rgba(255,255,255,.9),transparent),
    radial-gradient(2px 2px at 28% 64%,rgba(255,255,255,.6),transparent),
    radial-gradient(3px 3px at 41% 12%,rgba(255,255,240,.8),transparent),
    radial-gradient(2px 2px at 57% 44%,rgba(255,255,255,.5),transparent),
    radial-gradient(2px 2px at 66% 78%,rgba(255,255,255,.7),transparent),
    radial-gradient(3px 3px at 74% 18%,rgba(255,255,240,.85),transparent),
    radial-gradient(2px 2px at 86% 56%,rgba(255,255,255,.6),transparent),
    radial-gradient(2px 2px at 93% 30%,rgba(255,255,255,.8),transparent),
    radial-gradient(2px 2px at 8% 84%,rgba(255,255,255,.55),transparent),
    radial-gradient(2px 2px at 48% 90%,rgba(255,255,255,.65),transparent);
  animation:twinkle 3.2s ease-in-out infinite alternate;
}
@keyframes twinkle{ from{opacity:.55} to{opacity:1} }
.hidden{ display:none !important; }
button,a,.card,.fly,.balloon,.walker,.bubble,.food{ touch-action:manipulation; }

/* ===================== top bar ===================== */
#topBar{ position:fixed; top:0; left:0; right:0; z-index:50; display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:8px 14px; background:var(--surface); backdrop-filter:blur(6px); box-shadow:0 4px 14px rgba(0,0,0,.12); font-weight:bold; }
#homeBtn{ font-size:clamp(1.4rem,4vw,1.9rem); background:hsl(140,70%,90%); border:3px solid hsl(140,60%,55%); border-radius:50%;
  width:54px; height:54px; display:flex; align-items:center; justify-content:center; flex:none; cursor:pointer; }
#playerName{ font-size:clamp(1rem,3vw,1.5rem); color:var(--ink-strong); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#counter{ font-size:clamp(1rem,3vw,1.5rem); color:hsl(20,90%,40%); background:hsl(45,100%,88%); padding:4px 18px; border-radius:999px;
  border:3px solid hsl(40,90%,60%); min-width:92px; text-align:center; transition:transform .1s; }
#counter.bump{ transform:scale(1.25); }
#soundBtn,#themeBtn{ font-size:clamp(1.4rem,4vw,1.9rem); background:hsl(200,90%,90%); border:3px solid hsl(200,80%,60%); border-radius:50%;
  width:54px; height:54px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex:none; }
#themeBtn{ background:hsl(255,60%,92%); border-color:hsl(255,60%,62%); }

/* ===================== fx + celebrations ===================== */
#fxLayer{ position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:40; }
.fly{ position:fixed; font-size:var(--size,4rem); z-index:5; cursor:pointer; pointer-events:auto; animation-fill-mode:forwards; will-change:transform,opacity; line-height:1; }
@keyframes floatUp{ 0%{transform:translate(0,0) scale(0) rotate(0);opacity:0}
  10%{transform:translate(calc(var(--dx)*.1),calc(var(--dy)*.1)) scale(1.2) rotate(8deg);opacity:1}
  20%{transform:translate(calc(var(--dx)*.2),calc(var(--dy)*.2)) scale(1) rotate(-6deg)} 85%{opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) scale(.9) rotate(12deg);opacity:0} }
@keyframes driftSpin{ 0%{transform:translate(0,0) scale(0) rotate(0);opacity:0}
  12%{transform:translate(calc(var(--dx)*.12),calc(var(--dy)*.12)) scale(1.15) rotate(60deg);opacity:1} 85%{opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) scale(.8) rotate(360deg);opacity:0} }
@keyframes wobbleFloat{ 0%{transform:translate(0,0) scale(0);opacity:0}
  10%{transform:translate(calc(var(--dx)*.1),calc(var(--dy)*.1)) scale(1.25);opacity:1}
  50%{transform:translate(calc(var(--dx)*.5),calc(var(--dy)*.5)) rotate(14deg)} 85%{opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) scale(.85) rotate(0);opacity:0} }
.fly.popped{ animation:popOut .35s ease forwards !important; }
@keyframes popOut{ 0%{transform:scale(1);opacity:1} 50%{transform:scale(1.6) rotate(15deg);opacity:1} 100%{transform:scale(0) rotate(30deg);opacity:0} }
.big-letter{ position:fixed; left:50%; top:42%; transform:translate(-50%,-50%); font-size:clamp(8rem,30vw,18rem); font-weight:bold;
  text-shadow:5px 5px 0 rgba(255,255,255,.85),10px 10px 24px rgba(0,0,0,.18); pointer-events:none; z-index:45; animation:letterPop 1.6s ease forwards; line-height:1; }
.big-letter small{ font-size:.55em; margin-left:.08em; }
@keyframes letterPop{ 0%{transform:translate(-50%,-50%) scale(0) rotate(-15deg);opacity:0}
  18%{transform:translate(-50%,-50%) scale(1.15) rotate(4deg);opacity:1} 28%{transform:translate(-50%,-50%) scale(1) rotate(0)}
  75%{transform:translate(-50%,-50%) scale(1);opacity:1} 100%{transform:translate(-50%,-50%) scale(1.3);opacity:0} }
.word-label{ position:fixed; left:50%; top:70%; transform:translateX(-50%); font-size:clamp(2rem,7vw,3.6rem); font-weight:bold; color:#fff;
  background:hsl(280,70%,45%); padding:8px 34px; border-radius:999px; box-shadow:0 6px 16px rgba(0,0,0,.25); pointer-events:none; z-index:45; animation:labelPop 1.8s ease forwards; white-space:nowrap; }
@keyframes labelPop{ 0%{transform:translateX(-50%) scale(0);opacity:0} 15%{transform:translateX(-50%) scale(1.1);opacity:1}
  25%{transform:translateX(-50%) scale(1)} 80%{opacity:1} 100%{transform:translateX(-50%) scale(1.1);opacity:0} }
.praise{ position:fixed; left:50%; top:28%; transform:translateX(-50%); font-size:clamp(2rem,7vw,4rem); font-weight:bold; color:hsl(45,100%,50%);
  -webkit-text-stroke:2px hsl(20,90%,40%); text-shadow:4px 4px 0 rgba(255,255,255,.9); z-index:60; pointer-events:none; animation:praisePop 2.6s ease forwards; white-space:nowrap; }
@keyframes praisePop{ 0%{transform:translateX(-50%) scale(0) rotate(-10deg);opacity:0} 12%{transform:translateX(-50%) scale(1.2) rotate(3deg);opacity:1}
  22%{transform:translateX(-50%) scale(1) rotate(0)} 80%{opacity:1;transform:translateX(-50%) scale(1.05)} 100%{opacity:0;transform:translateX(-50%) scale(1.3)} }

/* ===================== HUB ===================== */
#hub{ min-height:100%; display:flex; flex-direction:column; align-items:center; gap:16px; padding:24px 16px 40px; }
#hub h1{ font-size:clamp(2rem,7vw,3.8rem); color:var(--ink-strong); text-shadow:3px 3px 0 rgba(255,255,255,.8); text-align:center; animation:bounceTitle 2s ease-in-out infinite; }
@keyframes bounceTitle{ 0%,100%{transform:translateY(0) rotate(-1deg)} 50%{transform:translateY(-10px) rotate(1deg)} }
#greeting{ font-size:clamp(1.1rem,4vw,1.7rem); font-weight:bold; color:var(--ink-strong); background:var(--surface-soft); padding:6px 20px; border-radius:999px;
  display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center; }
#greeting button{ font-size:1.2rem; background:none; border:none; cursor:pointer; }
#tabs{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
.tab{ font-size:clamp(1rem,3.4vw,1.3rem); font-weight:bold; font-family:inherit; color:var(--ink-strong); background:var(--surface-soft);
  border:3px solid transparent; border-radius:999px; padding:8px 22px; cursor:pointer; box-shadow:0 4px 10px rgba(0,0,0,.1); transition:transform .1s; }
.tab.on{ color:#fff; background:linear-gradient(135deg,hsl(280,75%,55%),hsl(320,70%,55%)); }
.tab:active{ transform:scale(.96); }
#cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:22px; width:min(1100px,94vw); margin-top:6px; }
.card{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:26px 14px; border-radius:28px; text-align:center; cursor:pointer;
  border:5px solid rgba(255,255,255,.7); color:#fff; box-shadow:0 10px 0 rgba(0,0,0,.12),0 14px 26px rgba(0,0,0,.15); transition:transform .15s ease; }
.card:hover,.card:focus-visible{ transform:scale(1.05) rotate(-1.5deg); }
.card:active{ transform:scale(.97); }
.card .icon{ font-size:clamp(3.2rem,8vw,4.8rem); line-height:1; animation:iconBob 2.4s ease-in-out infinite; }
.card:nth-child(2n) .icon{ animation-delay:.3s; } .card:nth-child(3n) .icon{ animation-delay:.6s; } .card:nth-child(4n) .icon{ animation-delay:.9s; }
@keyframes iconBob{ 0%,100%{transform:translateY(0) rotate(-4deg)} 50%{transform:translateY(-10px) rotate(4deg)} }
.card .name{ font-size:clamp(1.25rem,4vw,1.8rem); font-weight:bold; text-shadow:2px 2px 0 rgba(0,0,0,.25); }
.card .sub{ font-size:clamp(.85rem,2.5vw,1.05rem); font-weight:bold; color:rgba(255,255,255,.95); }
.card .tag{ font-size:.75rem; font-weight:bold; letter-spacing:.5px; text-transform:uppercase; background:rgba(255,255,255,.28); padding:2px 12px; border-radius:999px; }
.c-letters{ background:linear-gradient(145deg,hsl(275,75%,58%),hsl(300,70%,50%)); }
.c-balloons{ background:linear-gradient(145deg,hsl(350,85%,60%),hsl(15,90%,55%)); }
.c-piano{ background:linear-gradient(145deg,hsl(200,85%,50%),hsl(230,75%,55%)); }
.c-paint{ background:linear-gradient(145deg,hsl(140,70%,42%),hsl(170,75%,38%)); }
.c-animals{ background:linear-gradient(145deg,hsl(35,95%,50%),hsl(50,95%,45%)); }
.c-fireworks{ background:linear-gradient(145deg,hsl(245,65%,40%),hsl(280,70%,36%)); }
.c-monster{ background:linear-gradient(145deg,hsl(268,70%,52%),hsl(315,70%,45%)); }
.c-bubbles{ background:linear-gradient(145deg,hsl(190,85%,44%),hsl(215,80%,52%)); }
.c-shapes{ background:linear-gradient(145deg,hsl(0,80%,55%),hsl(330,80%,48%)); }
.c-maze{ background:linear-gradient(145deg,hsl(28,65%,48%),hsl(38,70%,40%)); }
.c-catch{ background:linear-gradient(145deg,hsl(165,70%,40%),hsl(185,75%,38%)); }
.c-routine{ background:linear-gradient(145deg,hsl(205,80%,52%),hsl(250,60%,55%)); }
.c-memory{ background:linear-gradient(145deg,hsl(255,65%,55%),hsl(230,70%,50%)); }
.c-buildface{ background:linear-gradient(145deg,hsl(15,85%,56%),hsl(38,88%,50%)); }
.c-sort{ background:linear-gradient(145deg,hsl(120,55%,45%),hsl(160,65%,40%)); }
.parent-tip{ font-size:.95rem; color:var(--ink); background:var(--surface-soft); padding:8px 18px; border-radius:999px; text-align:center; }
#hubFooter{ text-align:center; color:var(--ink); font-size:.9rem; opacity:.85; margin-top:6px; line-height:1.5; }
#hubFooter a{ color:var(--ink-strong); font-weight:bold; }

/* ===================== name overlay ===================== */
#nameOverlay{ position:fixed; inset:0; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; text-align:center; padding:20px;
  background:linear-gradient(160deg,hsl(45,100%,85%),hsl(330,90%,88%),hsl(200,90%,85%)); }
html[data-theme="dark"] #nameOverlay{ background:linear-gradient(160deg,hsl(255,45%,16%),hsl(310,40%,18%),hsl(210,45%,15%)); }
#nameOverlay .row{ font-size:clamp(2rem,6vw,3.4rem); letter-spacing:12px; }
#nameOverlay h2{ font-size:clamp(1.8rem,7vw,3.4rem); color:hsl(280,70%,40%); text-shadow:3px 3px 0 rgba(255,255,255,.8); }
html[data-theme="dark"] #nameOverlay h2{ color:hsl(280,90%,80%); text-shadow:none; }
#nameInput{ font-family:inherit; font-size:clamp(1.4rem,4vw,2rem); padding:14px 24px; border:4px solid hsl(280,70%,60%); border-radius:999px;
  text-align:center; outline:none; width:min(400px,85vw); background:#fff; color:hsl(280,60%,30%); }
#nameInput:focus{ border-color:hsl(330,90%,55%); box-shadow:0 0 0 6px hsla(330,90%,55%,.25); }
#saveNameBtn{ font-family:inherit; font-size:clamp(1.4rem,4vw,2rem); font-weight:bold; color:#fff; padding:16px 46px; border:none; border-radius:999px; cursor:pointer;
  background:linear-gradient(135deg,hsl(140,75%,32%),hsl(160,80%,27%)); box-shadow:0 8px 0 hsl(150,70%,20%),0 12px 20px rgba(0,0,0,.2); }
#saveNameBtn:active{ transform:translateY(6px); box-shadow:0 2px 0 hsl(150,70%,30%); }

/* ===================== game root + shared ===================== */
#gameRoot{ position:fixed; inset:0; }
.g-hint{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%); font-size:clamp(1rem,3vw,1.4rem); font-weight:bold; color:var(--ink);
  background:var(--surface-soft); padding:8px 22px; border-radius:999px; pointer-events:none; z-index:8; text-align:center; }
.g-hint.top{ bottom:auto; top:70px; }

/* balloons */
#sky{ position:fixed; inset:0; overflow:hidden; }
.balloon{ position:fixed; width:clamp(70px,12vw,110px); height:clamp(88px,15vw,138px); cursor:pointer; animation:rise var(--dur) linear forwards; will-change:transform; z-index:10; }
@keyframes rise{ from{transform:translateY(0)} to{transform:translateY(calc(-100vh - 320px))} }
.balloon .body{ width:100%; height:100%; border-radius:50% 50% 48% 52%/55% 55% 45% 45%;
  background:radial-gradient(circle at 35% 28%,hsl(var(--bh),95%,82%),hsl(var(--bh),88%,58%) 60%,hsl(var(--bh),80%,45%));
  box-shadow:inset -8px -10px 18px rgba(0,0,0,.12); animation:sway var(--sway) ease-in-out infinite alternate; position:relative; }
.balloon .body::before{ content:''; position:absolute; bottom:-10px; left:50%; transform:translateX(-50%);
  border-left:9px solid transparent; border-right:9px solid transparent; border-top:12px solid hsl(var(--bh),80%,45%); }
.balloon .body::after{ content:''; position:absolute; bottom:-70px; left:50%; width:3px; height:62px; background:rgba(120,90,60,.55); border-radius:3px; }
@keyframes sway{ from{transform:translateX(-16px) rotate(-4deg)} to{transform:translateX(16px) rotate(4deg)} }
.balloon.popping{ pointer-events:none; animation-play-state:paused; }
.balloon.popping .body{ animation:balloonPop .3s ease forwards; }
@keyframes balloonPop{ 0%{transform:scale(1);opacity:1} 40%{transform:scale(1.35);opacity:1} 100%{transform:scale(.1);opacity:0} }

/* piano */
#stage{ position:fixed; inset:0; overflow:hidden; cursor:pointer; }
.bar{ position:fixed; bottom:0; width:clamp(40px,7vw,90px); border-radius:20px 20px 0 0; background:linear-gradient(to top,hsl(var(--nh),85%,55%),hsl(var(--nh),90%,70%));
  box-shadow:0 0 24px hsla(var(--nh),90%,60%,.6); animation:barRise .9s ease-out forwards; pointer-events:none; z-index:10; transform-origin:bottom; }
@keyframes barRise{ 0%{transform:scaleY(0);opacity:1} 25%{transform:scaleY(1.05)} 35%{transform:scaleY(1)} 70%{opacity:.9} 100%{transform:scaleY(1);opacity:0} }
.bar .tag{ position:absolute; top:-64px; left:50%; transform:translateX(-50%); font-size:clamp(2rem,5vw,3rem); font-weight:bold; color:#fff; background:hsl(var(--nh),80%,45%);
  border-radius:50%; width:60px; height:60px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,.25); animation:tagBounce .9s ease-out forwards; }
@keyframes tagBounce{ 0%{transform:translateX(-50%) scale(0)} 30%{transform:translateX(-50%) scale(1.3)} 50%{transform:translateX(-50%) scale(1)} 100%{transform:translateX(-50%) scale(1);opacity:0} }
.ripple{ position:fixed; border-radius:50%; border:6px solid hsla(var(--nh),85%,55%,.8); pointer-events:none; z-index:9; animation:rippleOut .7s ease-out forwards; }
@keyframes rippleOut{ from{width:20px;height:20px;opacity:1;margin:-10px} to{width:240px;height:240px;opacity:0;margin:-120px} }

/* paint */
#paint{ position:fixed; inset:0; touch-action:none; cursor:crosshair; }
#clearBtn{ position:fixed; right:20px; bottom:20px; font-size:clamp(2rem,6vw,3rem); width:clamp(70px,14vw,100px); height:clamp(70px,14vw,100px); border-radius:50%;
  border:5px solid hsl(200,80%,55%); background:#fff; cursor:pointer; box-shadow:0 6px 0 hsl(200,60%,45%),0 10px 18px rgba(0,0,0,.2); z-index:45; }
#clearBtn:active{ transform:translateY(5px); box-shadow:0 1px 0 hsl(200,60%,45%); }
#flash{ position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:44; }
#flash.go{ animation:flashClean .5s ease; }
@keyframes flashClean{ 0%{opacity:0} 40%{opacity:1} 100%{opacity:0} }

/* animals (walkers) */
#meadow{ position:fixed; inset:0; overflow:hidden; }
#ground{ position:fixed; left:0; right:0; bottom:0; height:16vh; z-index:1; background:linear-gradient(to top,hsl(110,55%,55%),hsl(110,60%,68%)); border-radius:100% 100% 0 0/40px 40px 0 0; }
html[data-theme="dark"] #ground{ background:linear-gradient(to top,hsl(110,35%,20%),hsl(110,40%,28%)); }
.walker{ position:fixed; left:0; top:0; font-size:var(--size,6rem); cursor:pointer; z-index:10; animation:walk var(--dur) linear forwards; line-height:1; will-change:transform; }
@keyframes walk{ from{transform:translateX(var(--fromX))} to{transform:translateX(var(--toX))} }
.walker .bob{ display:inline-block; animation:waddle .55s ease-in-out infinite alternate; transform-origin:bottom center; }
.walker.flip .bob .face{ display:inline-block; transform:scaleX(-1); }
@keyframes waddle{ from{transform:translateY(0) rotate(-4deg)} to{transform:translateY(-8px) rotate(4deg)} }
.walker.jumping .bob{ animation:jump .7s ease; }
@keyframes jump{ 0%{transform:translateY(0) scale(1)} 30%{transform:translateY(-70px) scale(1.2) rotate(-8deg)} 60%{transform:translateY(-30px) scale(1.1) rotate(8deg)} 80%{transform:translateY(4px) scaleY(.85) scaleX(1.15)} 100%{transform:translateY(0) scale(1)} }
.speech{ position:absolute; top:-.9em; left:50%; transform:translateX(-50%); font-size:.32em; font-weight:bold; font-family:inherit; color:hsl(20,85%,35%);
  background:#fff; border:3px solid hsl(20,85%,55%); padding:4px 16px; border-radius:999px; white-space:nowrap; animation:bubblePopA 1.6s ease forwards; pointer-events:none; }
@keyframes bubblePopA{ 0%{transform:translateX(-50%) scale(0);opacity:0} 15%{transform:translateX(-50%) scale(1.15);opacity:1} 25%{transform:translateX(-50%) scale(1)} 80%{opacity:1} 100%{transform:translateX(-50%) scale(1.1);opacity:0} }

/* fireworks */
body.night{ --bg-s1:55%; --bg-l1:10%; --bg-s2:55%; --bg-l2:15%; --h:235; --h2:275; }
#nightStars{ position:fixed; inset:0; pointer-events:none; z-index:0; background-image:
  radial-gradient(2px 2px at 15% 25%,rgba(255,255,255,.9),transparent),
  radial-gradient(2px 2px at 33% 60%,rgba(255,255,255,.5),transparent),
  radial-gradient(3px 3px at 46% 15%,rgba(255,255,240,.8),transparent),
  radial-gradient(2px 2px at 62% 40%,rgba(255,255,255,.6),transparent),
  radial-gradient(2px 2px at 71% 75%,rgba(255,255,255,.7),transparent),
  radial-gradient(3px 3px at 82% 22%,rgba(255,255,240,.85),transparent),
  radial-gradient(2px 2px at 91% 58%,rgba(255,255,255,.55),transparent),
  radial-gradient(2px 2px at 8% 78%,rgba(255,255,255,.6),transparent);
  animation:twinkle 3s ease-in-out infinite alternate; }
.rocket{ position:fixed; width:8px; height:22px; border-radius:4px; background:linear-gradient(to top,transparent,hsl(var(--fh),100%,75%));
  box-shadow:0 0 12px hsl(var(--fh),100%,70%); pointer-events:none; z-index:10; animation:rocketUp var(--rt) ease-out forwards; }
@keyframes rocketUp{ from{transform:translateY(0) scaleY(1.4);opacity:1} to{transform:translateY(var(--rise)) scaleY(.8);opacity:.9} }

  voice=en.filter(function(v){ return /female|zira|samantha|karen|tessa|google/i.test(v.name); })[0] || en[0] || vs[0]; }
if(hasSpeech){ loadVoices(); try{ speechSynthesis.onvoiceschanged=loadVoices; }catch(e){}
  setInterval(function(){ try{ if(speechSynthesis.speaking && speechSynthesis.paused) speechSynthesis.resume(); }catch(e){} },4000); }
function unlockSpeech(){ if(speechUnlocked || !hasSpeech) return; speechUnlocked=true;
  try{ speechSynthesis.resume(); }catch(e){}
  try{ var u=new SpeechSynthesisUtterance('hi'); u.volume=0.01; if(voice) u.voice=voice; speakRefs.push(u); speechSynthesis.speak(u); }catch(e){}
  loadVoices();
  if(pendingSpeech){ var t=pendingSpeech; pendingSpeech=null; setTimeout(function(){ speak(t,true); },120); } }
document.addEventListener('pointerdown',unlockSpeech,true);
document.addEventListener('touchstart',unlockSpeech,true);
document.addEventListener('keydown',unlockSpeech,true);
function speak(text,force){
  if(!soundOn || !hasSpeech) return;
  if(!speechUnlocked){ pendingSpeech=text; return; }
  var now=Date.now(); if(!force && now-lastSpeak<SPEAK_THROTTLE) return; lastSpeak=now;
  try{ speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=0.85; u.pitch=1.2; u.volume=1;
    if(!voice) loadVoices(); if(voice) u.voice=voice;
    speakRefs.push(u); if(speakRefs.length>6) speakRefs.shift();
    try{ speechSynthesis.resume(); }catch(e2){}
    speechSynthesis.speak(u); }catch(e){}
}

function makeReg(){
  var intervals=[], timeouts=[], listeners=[], reg;
  reg={ alive:true,
    interval:function(f,ms){ var id=setInterval(f,ms); intervals.push(id); return id; },
    timeout:function(f,ms){ var id=setTimeout(f,ms); timeouts.push(id); return id; },
    raf:function(f){ if(!reg.alive) return 0; return requestAnimationFrame(f); },
    on:function(t,e,f,o){ t.addEventListener(e,f,o); listeners.push([t,e,f,o]); },
    destroy:function(){ reg.alive=false; intervals.forEach(clearInterval); timeouts.forEach(clearTimeout);
      listeners.forEach(function(l){ l[0].removeEventListener(l[1],l[2],l[3]); });
      if('speechSynthesis' in window) try{ speechSynthesis.cancel(); }catch(e){} }

}

  var COLORS=[['Red',0],['Orange',30],['Yellow',52],['Green',130],['Blue',210],['Purple',275],['Pink',330]];
  var MAX=9, pops=0;

    if(sky.querySelectorAll('.balloon:not(.popping)').length>=MAX) return;

BUILDERS.piano=function(root,reg){
  startGame({counterEmoji:'🎵',milestone:25});
  root.innerHTML='<div id="stage"></div><div class="g-hint">🎹 Press any key or tap anywhere!</div>';
  var stage=$('#stage',root); var BASE=130.81, PENTA=[0,2,4,7,9], ctx=null;
  function audio(){ if(!ctx){ var AC=window.AudioContext||window.webkitAudioContext; if(!AC) return null; ctx=new AC(); } if(ctx.state==='suspended') ctx.resume(); return ctx; }
  function noteFreq(idx){ var o=Math.floor(idx/5), s=PENTA[idx%5]; return BASE*Math.pow(2,o+s/12); }
  function playNote(idx,when,dur){ if(!soundOn) return; var ac=audio(); if(!ac) return; var t=ac.currentTime+(when||0); dur=dur||0.7; var f=noteFreq(idx);
    var o=ac.createOscillator(); o.type='triangle'; o.frequency.value=f; var s=ac.createOscillator(); s.type='sine'; s.frequency.value=f*2;
    var g=ac.createGain(); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.3,t+0.02); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    var g2=ac.createGain(); g2.gain.setValueAtTime(0,t); g2.gain.linearRampToValueAtTime(0.06,t+0.02); g2.gain.exponentialRampToValueAtTime(0.001,t+dur*0.6);
    o.connect(g); g.connect(ac.destination); s.connect(g2); g2.connect(ac.destination); o.start(t); o.stop(t+dur); s.start(t); s.stop(t+dur); }
  function showBar(idx,label,xFrac){ var bar=document.createElement('div'); bar.className='bar'; bar.style.setProperty('--nh',Math.round(idx/18*300));
    bar.style.left='calc('+(xFrac*100)+'vw - 3vw)'; bar.style.height=(22+idx*3.2)+'vh';
    if(label){ var tag=document.createElement('span'); tag.className='tag'; tag.textContent=label; bar.appendChild(tag); }
    bar.addEventListener('animationend',function(e){ if(e.target===bar) bar.remove(); }); stage.appendChild(bar);
    if(Math.random()<0.3) spawnFly(pick(['🎵','🎶','⭐','✨']),xFrac*innerWidth,innerHeight*0.5,2.5); }
  function showRipple(x,y,idx){ var r=document.createElement('div'); r.className='ripple'; r.style.left=x+'px'; r.style.top=y+'px'; r.style.setProperty('--nh',Math.round(idx/18*300)); r.addEventListener('animationend',function(){ r.remove(); }); stage.appendChild(r); }
  var ROWS=['zxcvbnm','asdfghjkl','qwertyuiop'];
  function keyToNote(ch){ for(var r=0;r<ROWS.length;r++){ var p=ROWS[r].indexOf(ch); if(p!==-1) return { idx:r*5+Math.floor(p*8/ROWS[r].length), xFrac:(p+0.5)/ROWS[r].length }; } return null; }
  reg.on(document,'keydown',function(e){ var key=guardKey(e); if(key===null) return; var lower=key.length===1?key.toLowerCase():''; var m=lower?keyToNote(lower):null;
    if(m){ playNote(m.idx); showBar(m.idx,key.toUpperCase(),m.xFrac); } else if(key===' '){ playNote(5,0); playNote(7,0.06); playNote(10,0.12); partyBurst(1); }
    else{ var idx=Math.floor(rand(0,18)); playNote(idx); showBar(idx,'♪',rand(0.1,0.9)); } bumpCounter(); });
  reg.on(stage,'pointerdown',function(e){ var xFrac=e.clientX/innerWidth; var idx=Math.min(17,Math.floor(xFrac*18)); playNote(idx); showBar(idx,'♪',xFrac); showRipple(e.clientX,e.clientY,idx); bumpCounter(); });
  speak('Make some music, '+playerName+'!');
};

    canvas.width=innerWidth; canvas.height=innerHeight; if(old.width) cx.drawImage(old,0,0); cx.lineCap='round'; cx.lineJoin='round'; }

  var BANDS=[[15,'Red'],[45,'Orange'],[70,'Yellow'],[160,'Green'],[250,'Blue'],[300,'Purple'],[345,'Pink'],[360,'Red']];
  function colorName(h){ for(var i=0;i<BANDS.length;i++){ if(h<BANDS[i][0]) return BANDS[i][1]; } return 'Red'; }

      if(it.y>=cy-40 && it.y<=cy+50 && Math.abs(it.x-basketX)<58){ it.done=true; it.el.classList.add('caught'); burstAt(it.x,cy,['✨','⭐']);
        basket.classList.remove('catch'); void basket.offsetWidth; basket.classList.add('catch'); caught++; if(caught%3===0) speak(it.word+'!'); bumpCounter();
        reg.timeout((function(el){ return function(){ el.remove(); }; })(it.el),350); items.splice(i,1); }
      else if(it.y>innerHeight+10){ it.done=true; it.el.remove(); items.splice(i,1); } }
    reg.raf(loop); }
  reg.on(window,'resize',function(){ setBasket(basketX); });
  speak('Catch the treats, '+playerName+'!'); reg.raf(loop);
};

/* ---------- MORNING ROUTINE ---------- */
BUILDERS.routine=function(root,reg){
  startGame({showCounter:false});
  root.innerHTML='<div id="rWrap"><div id="dots"></div><div id="instruction"></div><div id="rStage"><span id="rItem"></span><span id="rCheck">✅</span></div><div id="tapHint">👆 Tap to do it!</div></div>';
  var dotsEl=$('#dots',root), instr=$('#instruction',root), stage=$('#rStage',root), itemEl=$('#rItem',root), tapHint=$('#tapHint',root);
  var STEPS=[['☀️','Wake up!','Good morning! Time to wake up!','Good morning!'],['🪥','Brush your teeth','Tap to brush your teeth!','Scrub scrub! So clean!'],['🚿','Wash your face','Tap to wash your face!','Splish splash! All fresh!'],['👕','Get dressed','Tap to put on your clothes!','Getting dressed! Looking good!'],['🥣','Eat breakfast','Tap to eat your yummy breakfast!','Yum yum! All full!'],['🎒','Pack your bag','Tap to pack your backpack!','Backpack ready!'],['🚌','Off to school','Tap to go to school!','Bye bye! Have a great day!']];
  var idx=0, busy=false;
  STEPS.forEach(function(s,i){ var d=document.createElement('div'); d.className='dot'; d.textContent=s[0]; d.dataset.i=i; dotsEl.appendChild(d); });
  function render(){ var step=STEPS[idx]; itemEl.textContent=step[0]; instr.textContent=step[1]; tapHint.style.display='';
    Array.prototype.forEach.call(dotsEl.children,function(d,i){ d.classList.toggle('done',i<idx); d.classList.toggle('active',i===idx); }); speak(step[2]); }
  function doStep(){ if(busy) return; busy=true; var step=STEPS[idx]; stage.classList.remove('tapped'); void stage.offsetWidth; stage.classList.add('tapped');
    var r=stage.getBoundingClientRect(); burstAt(r.left+r.width/2,r.top+r.height/3,['✨','⭐','💫']); speak(step[3],true); tapHint.style.display='none';
    reg.timeout(function(){ idx++; if(idx>=STEPS.length) finish(); else { busy=false; render(); } },1300); }
  function finish(){ Array.prototype.forEach.call(dotsEl.children,function(d){ d.classList.add('done'); d.classList.remove('active'); });
    instr.textContent='🎉 All ready for the day!'; itemEl.textContent='🌟'; tapHint.textContent='👆 Tap to do it all again!'; tapHint.style.display='';
    celebrate('All ready for the day, '+playerName+'!'); busy=false; idx=-1; }
  reg.on(stage,'pointerdown',function(e){ e.preventDefault(); if(idx===-1){ idx=0; render(); return; } doStep(); });
  reg.on(document,'keydown',function(e){ if(guardKey(e)===null) return; if(idx===-1){ idx=0; render(); return; } doStep(); });
  render();
};

/* ---------- MEMORY MATCH ---------- */
BUILDERS.memory=function(root,reg){
  startGame({counterEmoji:'🃏',milestone:3});
  root.innerHTML='<div id="memWrap"><div class="g-hint" style="position:static;transform:none">🃏 Find the matching pairs!</div><div id="memGrid"></div></div>';
  var grid=$('#memGrid',root);
  var ANIMALS=[['🐶','Dog'],['🐱','Cat'],['🐰','Rabbit'],['🐼','Panda'],['🦁','Lion'],['🐸','Frog'],['🐵','Monkey'],['🐧','Penguin'],['🦊','Fox'],['🐮','Cow']];
  var pairs=2, first=null, lock=false, matched=0;
  function layout(n){ var cols=n<=2?2:(n<=4?(n===3?3:4):4); var total=n*2, rows=Math.ceil(total/cols);
    var sz=Math.max(58,Math.floor(Math.min(Math.min(innerWidth-40,520)/cols,(innerHeight-220)/rows))-12);
    document.documentElement.style.setProperty('--csz',sz+'px'); grid.style.gridTemplateColumns='repeat('+cols+',var(--csz))'; }
  function build(){ var chosen=shuffle(ANIMALS.slice()).slice(0,pairs); var deck=shuffle(chosen.concat(chosen)); layout(pairs); grid.innerHTML=''; matched=0; first=null; lock=false;
    deck.forEach(function(h){ var card=document.createElement('div'); card.className='mcard'; card.dataset.key=h[0]; card.dataset.word=h[1];
      card.innerHTML='<div class="face back">❓</div><div class="face front">'+h[0]+'</div>'; card.addEventListener('pointerdown',function(ev){ ev.preventDefault(); flip(card); }); grid.appendChild(card); }); }
  function flip(card){ if(lock||card===first||card.classList.contains('matched')||card.classList.contains('up')) return; card.classList.add('up');
    if(!first){ first=card; return; }
    if(first.dataset.key===card.dataset.key){ lock=true; reg.timeout(function(){ first.classList.add('matched'); card.classList.add('matched'); first.classList.remove('up'); card.classList.remove('up');
      var r=card.getBoundingClientRect(); burstAt(r.left+r.width/2,r.top+r.height/2,['✨','⭐','🎉']); speak(card.dataset.word+'!'); bumpCounter(); matched++; first=null; lock=false;
      if(matched===pairs){ reg.timeout(function(){ celebrate('You found them all, '+playerName+'!'); pairs=Math.min(6,pairs+1); reg.timeout(build,1600); },400); } },350); }
    else{ lock=true; var a=first, b=card; reg.timeout(function(){ a.classList.remove('up'); b.classList.remove('up'); first=null; lock=false; },1000); } }
  reg.on(window,'resize',function(){ layout(pairs); });
  speak('Find the matching pairs, '+playerName+'!'); build();
};

/* ---------- BUILD-A-FACE ---------- */
BUILDERS.buildface=function(root,reg){
  startGame({showCounter:false});
  root.innerHTML='<div id="faceWrap"><div class="g-hint" style="position:static;transform:none">🥸 Tap to add a silly face!</div><div id="face"></div><div id="palette"></div><button id="faceClear" type="button">🧽 Start over</button></div>';
  var face=$('#face',root), palette=$('#palette',root);
  var PARTS=[['👀','Eyes',50,38],['👁️','Eye',50,38],['👃','Nose',50,54],['👄','Mouth',50,70],['😛','Tongue',50,70],['👂','Ears',50,50],['🎩','Hat',50,10],['👑','Crown',50,10],['👓','Glasses',50,40],['🧢','Cap',50,12],['🥸','Disguise',50,48],['⭐','Star',50,30],['🎀','Bow',50,14],['👺','Big nose',50,54]];
  function addPart(emoji,word,xPct,yPct){ var p=document.createElement('span'); p.className='part'; p.textContent=emoji;
    var x=Math.max(12,Math.min(88,xPct+rand(-10,10))), y=Math.max(8,Math.min(90,yPct+rand(-6,6))); p.style.left=x+'%'; p.style.top=y+'%'; face.appendChild(p); enableDrag(p); speak(word+'!'); }
  function enableDrag(p){ p.addEventListener('pointerdown',function(e){ e.preventDefault(); e.stopPropagation(); var rect=face.getBoundingClientRect(); try{ p.setPointerCapture(e.pointerId); }catch(err){}
    function moveTo(ev){ var x=((ev.clientX-rect.left)/rect.width)*100, y=((ev.clientY-rect.top)/rect.height)*100; p.style.left=Math.max(4,Math.min(96,x))+'%'; p.style.top=Math.max(4,Math.min(96,y))+'%'; }
    function up(){ p.removeEventListener('pointermove',moveTo); p.removeEventListener('pointerup',up); }
    p.addEventListener('pointermove',moveTo); p.addEventListener('pointerup',up); }); }
  PARTS.forEach(function(part){ var b=document.createElement('button'); b.type='button'; b.textContent=part[0]; b.setAttribute('aria-label',part[1]);
    b.addEventListener('pointerdown',function(e){ e.preventDefault(); addPart(part[0],part[1],part[2],part[3]); }); palette.appendChild(b); });
  $('#faceClear',root).addEventListener('click',function(){ Array.prototype.forEach.call(face.querySelectorAll('.part'),function(p){ p.remove(); }); speak('All clean! Start again!',true); this.blur(); });
  speak('Make a silly face, '+playerName+'!');
};

/* ---------- SORTING BINS ---------- */
BUILDERS.sort=function(root,reg){
  startGame({counterEmoji:'🧩',milestone:5});
  root.innerHTML='<div id="sortWrap"><div class="g-hint" style="position:static;transform:none" id="sortHint"></div><div id="sortItemZone"><span id="sortItem"></span></div><div id="bins"></div></div>';
  var hint=$('#sortHint',root), itemEl=$('#sortItem',root), binsEl=$('#bins',root);
  var CATEGORIES=[
    {key:'food',icon:'🍎',label:'Food',items:['🍎','🍌','🍓','🍇','🍕','🥕','🍩','🧀']},
    {key:'animal',icon:'🐶',label:'Animals',items:['🐶','🐱','🐰','🦁','🐸','🐮','🐧','🐵']},
    {key:'toy',icon:'🧸',label:'Toys',items:['🧸','⚽','🪀','🎈','🚗','🪁','🎨','🧩']}
  ];
  var round=null, binEls=[], dragging=false, homeRect=null;
  function buildBins(a,b){ binsEl.innerHTML=''; binEls=[]; [a,b].forEach(function(cat){ var bin=document.createElement('div'); bin.className='bin'; bin.dataset.key=cat.key;
    bin.innerHTML='<span class="binIcon">'+cat.icon+'</span><span class="binLabel">'+cat.label+'</span>'; binsEl.appendChild(bin); binEls.push(bin); }); }
  function resetItemPos(){ itemEl.style.position=''; itemEl.style.left=''; itemEl.style.top=''; }
  function newRound(){ var correct=pick(CATEGORIES); var other=pick(CATEGORIES); while(other.key===correct.key) other=pick(CATEGORIES);
    var bins=Math.random()<0.5?[correct,other]:[other,correct]; buildBins(bins[0],bins[1]);
    round={correctKey:correct.key,emoji:pick(correct.items),label:correct.label}; itemEl.textContent=round.emoji; itemEl.classList.remove('spring'); hint.textContent='Where does this go?'; resetItemPos(); }
  function moveItem(x,y){ itemEl.style.left=(x-homeRect.width/2)+'px'; itemEl.style.top=(y-homeRect.height/2)+'px'; }
  function binUnder(x,y){ for(var i=0;i<binEls.length;i++){ var r=binEls[i].getBoundingClientRect(); if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom) return binEls[i]; } return null; }
  function highlight(x,y){ var over=binUnder(x,y); binEls.forEach(function(b){ b.classList.toggle('over',b===over); }); }
  itemEl.addEventListener('pointerdown',function(e){ e.preventDefault(); dragging=true; homeRect=itemEl.getBoundingClientRect(); itemEl.classList.add('dragging'); itemEl.classList.remove('spring');
    itemEl.style.position='fixed'; itemEl.style.width=homeRect.width+'px'; itemEl.style.textAlign='center'; try{ itemEl.setPointerCapture(e.pointerId); }catch(err){} moveItem(e.clientX,e.clientY); });
  itemEl.addEventListener('pointermove',function(e){ if(!dragging) return; moveItem(e.clientX,e.clientY); highlight(e.clientX,e.clientY); });
  itemEl.addEventListener('pointerup',function(e){ if(!dragging) return; dragging=false; itemEl.classList.remove('dragging'); var bin=binUnder(e.clientX,e.clientY); binEls.forEach(function(b){ b.classList.remove('over'); });
    if(bin){ if(bin.dataset.key===round.correctKey){ var r=bin.getBoundingClientRect(); burstAt(r.left+r.width/2,r.top,['✨','⭐','🎉']); speak('Yes! '+round.label+'!',true); bumpCounter();
      itemEl.style.display='none'; reg.timeout(function(){ itemEl.style.display=''; itemEl.style.width=''; newRound(); },500); return; } else speak('Try the other bin!'); }
    itemEl.classList.add('spring'); itemEl.style.left=homeRect.left+'px'; itemEl.style.top=homeRect.top+'px'; reg.timeout(function(){ itemEl.style.width=''; resetItemPos(); itemEl.classList.remove('spring'); },360); });
  speak('Put each thing in the right bin, '+playerName+'!'); newRound();
};
